---
layout: default
---

<div class='post-meta'>
    {% if page.tags %}<h2>{{ page.tags | join: ', ' }}</h2>{% endif %}
    <h1>{{ page.title }}</h1>
    <span>
        {% if page.author %}<em>{{ page.author }}</em><br/>{% endif %}
        <abbr>
            {% if page.date %}{{ page.date | date: '%d %b %Y' }}{% endif %}
        </abbr>
    </span>
</div>
<article>
    {{ page.content }}
</article>
